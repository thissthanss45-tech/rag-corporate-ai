global:
  resolve_timeout: 5m

route:
  receiver: default-log
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: critical-log
      matchers:
        - severity="critical"
      repeat_interval: 30m
    - receiver: warning-log
      matchers:
        - severity="warning"
      repeat_interval: 2h

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - job

receivers:
  - name: default-log
  - name: warning-log
  - name: critical-log

