global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: rag-bot
    static_configs:
      - targets: ["bot:9108"]

  - job_name: rag-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
